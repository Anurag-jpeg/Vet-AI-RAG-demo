<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vet‑AI RAG Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Vet‑AI RAG Demo</h1>

    <!-- PDF upload section -->
    <section class="card">
      <h2>Upload a PDF</h2>
      <form id="upload-form">
        <input type="file" id="pdf-input" accept=".pdf" required />
        <button type="submit">📥 Ingest PDF</button>
      </form>
      <p id="upload-status" class="status"></p>
    </section>

    <!-- Question/answer section -->
    <section class="card">
      <h2>Ask a question</h2>
      <label for="question">Question:</label>
      <textarea id="question" rows="3" placeholder="What is the purpose of this project?" required></textarea>

      <label for="k-slider">Number of chunks to retrieve (k): <span id="k-value">5</span></label>
      <input type="range" id="k-slider" min="1" max="10" value="5" />

      <button id="ask-btn">🤖 Get answer</button>

      <h3>Answer</h3>
      <div id="answer" class="answer-box"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
